appId: com.invoice-builder
productName: Invoice Builder

directories:
  output: release

publish:
  provider: github
  owner: piratuks
  repo: invoice-builder

files:
  - dist-fe/**
  - dist-be/**
  - node_modules/**
  - package.json

extraMetadata:
  main: dist-be/backend/main/main.cjs

forceCodeSigning: false

afterPack: scripts/afterPack.cjs

win:
  target:
    - nsis

nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false

linux:
  target:
    - deb
  category: Office
  maintainer: 'Piratuks <evaldiz@gmail.com>'
  icon: 'src/backend/main/assets/linux-icons'

mac:
  target:
    - dmg
  category: public.app-category.productivity
  icon: 'src/backend/main/assets/icon.icns'

dmg:
  contents:
    - type: file
      x: 130
      y: 220
    - type: link
      x: 410
      y: 220
      path: /Applications
