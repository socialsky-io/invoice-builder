appId: com.invoice-builder
productName: Invoice Builder

directories:
  output: release

files:
  - dist/**
  - dist-electron/**
  - node_modules/**
  - package.json

extraMetadata:
  main: dist-electron/main/main.cjs

win:
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
