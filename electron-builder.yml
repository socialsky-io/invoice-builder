appId: com.invoice-builder
productName: Invoice Builder

directories:
  output: release

publish:
  provider: github
  owner: piratuks
  repo: invoice-builder

files:
  - dist/**
  - dist-electron/**
  - node_modules/**
  - package.json

extraMetadata:
  main: dist-electron/main/main.cjs

forceCodeSigning: false

win:
  target:
    - nsis

nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false

linux:
  target:
    - deb
  category: Office
  maintainer: 'Piratuks <evaldiz@gmail.com>'
  icon: 'icon.png'
