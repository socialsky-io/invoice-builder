name: Manual Release (Win + Linux + MacOS)

on:
  workflow_dispatch:   

permissions:
  contents: write

jobs:
  win:
    environment: release
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    name: Build Windows Release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run release:win

  linux:
    environment: release
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    name: Build Linux Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Linux release
        run: npm run release:linux

  mac:
    environment: release
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    name: Build macOS Release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build MacOS release
        run: npm run release:mac

