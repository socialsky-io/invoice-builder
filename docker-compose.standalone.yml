# Single-container setup – backend and frontend run inside one container.
# Both ports (3000 backend, 3001 frontend) are exposed from the same container.
#
# Start:  docker compose -f docker-compose.standalone.yml up -d
# Stop:   docker compose -f docker-compose.standalone.yml down
#
# NOTE: VITE_API_URL is baked into the frontend at image-build time.
# If you need a custom backend URL, build the image yourself:
#   docker build --build-arg VITE_API_URL=http://your-host:3000 -t invoice-builder .
# and replace the `image:` line below with `image: invoice-builder`.

services:
  app:
    image: ghcr.io/piratuks/invoice-builder:latest
    # To build locally instead of pulling, uncomment the line below and remove the image: line above:
    # build: .
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: invoice-builder
    ports:
      # backend internal-only, works only via nginx
      # - '3000:3000'
      - '3001:3001'
    environment:
      - SERVICE=all
      - PORT=${PORT}
      - NODE_ENV=docker
      - DB_DIRECTORY=/data
      - DEV_SERVER_URL=${DEV_SERVER_URL}
      - FE_SERVER_URL=${FE_SERVER_URL}
      - MIGRATIONS_PATH=${MIGRATIONS_PATH}
      # nginx proxies /api/* to localhost (same container)
      - BACKEND_HOST=localhost
      - BACKEND_PORT=3000
    volumes:
      - app-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const net=require('net');const c=net.createConnection(3000,'localhost');c.on('connect',()=>{c.destroy();process.exit(0)});c.on('error',()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  app-data:
